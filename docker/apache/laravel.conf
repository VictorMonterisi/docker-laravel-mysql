<VirtualHost *:80>
    # Aponta o Apache para a pasta public/ do Laravel
    # IMPORTANTE: o Laravel exige que o DocumentRoot seja a pasta public/
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        # AllowOverride All permite que o .htaccess do Laravel funcione
        # (necessário para o roteamento da aplicação)
        AllowOverride All
        Require all granted
    </Directory>

    # Logs de erro e acesso (úteis para debugar problemas)
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>